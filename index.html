<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance API Test Dashboard</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans p-6">
    <div id="app" class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <div class="lg:col-span-2 space-y-6">
            
            <div class="bg-white p-5 rounded-lg shadow border border-slate-200">
                <h2 class="text-xl font-bold mb-4 text-indigo-600">1. Authentication</h2>
                <div class="mb-4">
                    <label class="block text-xs font-semibold text-slate-500 uppercase">Current JWT Token</label>
                    <input v-model="token" type="text" placeholder="No token yet. Login to generate one." class="w-full mt-1 p-2 bg-slate-100 border rounded text-xs text-slate-600 font-mono" readonly>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2 border-r pr-4">
                        <h3 class="font-semibold text-sm">Register</h3>
                        <input v-model="auth.email" type="email" placeholder="Email" class="w-full p-2 border rounded text-sm">
                        <input v-model="auth.password" type="password" placeholder="Password" class="w-full p-2 border rounded text-sm">
                        <select v-model="auth.role" class="w-full p-2 border rounded text-sm">
                            <option value="VIEWER">VIEWER</option>
                            <option value="ANALYST">ANALYST</option>
                            <option value="ADMIN">ADMIN</option>
                        </select>
                        <button @click="register" class="w-full bg-indigo-600 text-white p-2 rounded text-sm hover:bg-indigo-700 transition">POST /api/auth/register</button>
                    </div>
                    <div class="space-y-2 pl-2">
                        <h3 class="font-semibold text-sm">Login</h3>
                        <input v-model="auth.email" type="email" placeholder="Email" class="w-full p-2 border rounded text-sm">
                        <input v-model="auth.password" type="password" placeholder="Password" class="w-full p-2 border rounded text-sm">
                        <button @click="login" class="w-full bg-emerald-600 text-white p-2 rounded text-sm hover:bg-emerald-700 transition mt-auto">POST /api/auth/login</button>
                    </div>
                </div>
            </div>

            <div class="bg-white p-5 rounded-lg shadow border border-slate-200">
                <h2 class="text-xl font-bold mb-4 text-indigo-600">2. Dashboard Aggregation</h2>
                <button @click="getSummary" class="w-full bg-blue-600 text-white p-2 rounded text-sm hover:bg-blue-700 transition">GET /api/dashboard/summary</button>
            </div>

            <div class="bg-white p-5 rounded-lg shadow border border-slate-200">
                <h2 class="text-xl font-bold mb-4 text-indigo-600">3. Financial Records Management</h2>
                
                <div class="mb-6 p-4 bg-slate-50 border rounded">
                    <h3 class="font-semibold text-sm mb-3">Create New Record</h3>
                    <div class="grid grid-cols-2 gap-3 mb-3">
                        <input v-model.number="record.amount" type="number" placeholder="Amount (in cents)" class="p-2 border rounded text-sm">
                        <select v-model="record.type" class="p-2 border rounded text-sm">
                            <option value="INCOME">INCOME</option>
                            <option value="EXPENSE">EXPENSE</option>
                        </select>
                        <input v-model="record.category" type="text" placeholder="Category (e.g., Salary)" class="p-2 border rounded text-sm">
                        <input v-model="record.date" type="datetime-local" class="p-2 border rounded text-sm">
                    </div>
                    <input v-model="record.notes" type="text" placeholder="Notes (optional)" class="w-full p-2 border rounded text-sm mb-3">
                    <button @click="createRecord" class="w-full bg-indigo-600 text-white p-2 rounded text-sm hover:bg-indigo-700 transition">POST /api/records</button>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2 border-r pr-4">
                        <h3 class="font-semibold text-sm">Fetch Records</h3>
                        <div class="flex gap-2">
                            <input v-model="pagination.page" type="number" placeholder="Page" class="w-1/2 p-2 border rounded text-sm" title="Page">
                            <input v-model="pagination.limit" type="number" placeholder="Limit" class="w-1/2 p-2 border rounded text-sm" title="Limit">
                        </div>
                        <button @click="getRecords" class="w-full bg-blue-600 text-white p-2 rounded text-sm hover:bg-blue-700 transition">GET /api/records</button>
                    </div>
                    <div class="space-y-2 pl-2">
                        <h3 class="font-semibold text-sm">Delete Record</h3>
                        <input v-model="deleteId" type="text" placeholder="Record UUID" class="w-full p-2 border rounded text-sm">
                        <button @click="deleteRecord" class="w-full bg-red-600 text-white p-2 rounded text-sm hover:bg-red-700 transition">DELETE /api/records/:id</button>
                    </div>
                </div>
            </div>

        </div>

        <div class="bg-slate-900 rounded-lg shadow-xl border border-slate-700 flex flex-col h-[800px] sticky top-6">
            <div class="p-4 border-b border-slate-700 flex justify-between items-center bg-slate-800 rounded-t-lg">
                <h2 class="text-lg font-bold text-slate-200 flex items-center gap-2">
                    <span class="w-3 h-3 rounded-full" :class="statusColor"></span>
                    Server Response
                </h2>
                <span v-if="lastStatus" class="font-mono text-sm px-2 py-1 rounded bg-slate-950 text-slate-300 border border-slate-700">
                    Status: {{ lastStatus }}
                </span>
            </div>
            <div class="p-4 overflow-auto flex-1 font-mono text-xs text-green-400 bg-[#0d1117]">
                <pre class="whitespace-pre-wrap break-words">{{ formattedResponse }}</pre>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, computed } = Vue;

        createApp({
            setup() {
                const baseUrl = 'http://localhost:3000/api';
                const token = ref('');
                const lastResponse = ref({ message: 'Ready. Send a request to begin testing...' });
                const lastStatus = ref(null);

                // Form States
                const auth = ref({ email: 'test@example.com', password: 'securepassword123', role: 'ADMIN' });
                const record = ref({ 
                    amount: 5000, 
                    type: 'INCOME', 
                    category: 'Salary', 
                    date: new Date().toISOString().slice(0, 16), 
                    notes: 'Test dashboard entry' 
                });
                const pagination = ref({ page: 1, limit: 10 });
                const deleteId = ref('');

                // Computed visualization helpers
                const formattedResponse = computed(() => JSON.stringify(lastResponse.value, null, 2));
                const statusColor = computed(() => {
                    if (!lastStatus.value) return 'bg-slate-500';
                    if (lastStatus.value >= 200 && lastStatus.value < 300) return 'bg-emerald-500';
                    if (lastStatus.value >= 400 && lastStatus.value < 500) return 'bg-amber-500';
                    return 'bg-red-500';
                });

                // Core Fetch Wrapper
                const apiCall = async (method, endpoint, payload = null) => {
                    lastResponse.value = 'Loading...';
                    try {
                        const headers = { 'Content-Type': 'application/json' };
                        if (token.value) headers['Authorization'] = `Bearer ${token.value}`;

                        const options = { method, headers };
                        if (payload) options.body = JSON.stringify(payload);

                        const res = await fetch(`${baseUrl}${endpoint}`, options);
                        lastStatus.value = res.status;
                        
                        const data = await res.json();
                        lastResponse.value = data;
                        return data;
                    } catch (err) {
                        lastStatus.value = 500;
                        lastResponse.value = { error: 'Network Error or CORS failure', details: err.message };
                    }
                };

                // Endpoint Methods
                const register = () => apiCall('POST', '/auth/register', auth.value);
                
                const login = async () => {
                    const data = await apiCall('POST', '/auth/login', { email: auth.value.email, password: auth.value.password });
                    if (data && data.token) token.value = data.token; // Auto-save token
                };

                const getSummary = () => apiCall('GET', '/dashboard/summary');

                const createRecord = () => {
                    // Format date to ISO string for Zod validation
                    const payload = { ...record.value, date: new Date(record.value.date).toISOString() };
                    apiCall('POST', '/records', payload);
                };

                const getRecords = () => apiCall('GET', `/records?page=${pagination.value.page}&limit=${pagination.value.limit}`);
                
                const deleteRecord = () => {
                    if(!deleteId.value) return alert('Please enter a Record UUID');
                    apiCall('DELETE', `/records/${deleteId.value}`);
                };

                return {
                    token, auth, record, pagination, deleteId,
                    lastResponse, lastStatus, formattedResponse, statusColor,
                    register, login, getSummary, createRecord, getRecords, deleteRecord
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
